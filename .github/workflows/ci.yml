on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
      - name: Install packages
        run: pnpm i
      - name: Test (Linux)
        run: xvfb-run -a pnpm t
        if: runner.os == 'Linux'
      - name: Test (non-Linux)
        run: pnpm t
        if: runner.os != 'Linux'
