<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src ${cspSource}; script-src 'nonce-${nonce}';"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="${cssUri}" rel="stylesheet" />

    <title>ts-achieve: speedrun</title>
  </head>
  <body>
    <div id="time"><h1></h1></div>
    <div id="splits">
      <h2>Splits</h2>
      <dl>
        <dt>All achievements</dt>
        <dd></dd>
      </dl>
    </div>
    <div id="latest">
      <h2>Latest achievements</h2>
      <ul></ul>
    </div>
    <div id="buttons">
      <button id="begin-run">Begin run</button>
      <button id="end-run">End run</button>
    </div>
    <div id="history"><ul></ul></div>
    <div id="log"></div>

    <script nonce="${nonce}" src="${jsUri}"></script>
  </body>
</html>
